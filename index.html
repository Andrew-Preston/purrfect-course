<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fdf6e3">
<title>Purrfect Course</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
  body {
    background: #fdf6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #5d4037;
    padding-top: env(safe-area-inset-top);
    position: relative;
  }
  input { user-select: text; -webkit-user-select: text; -webkit-touch-callout: default; }

  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 1.25rem;
  }
  .screen.active { display: flex; }

  h1 { font-size: clamp(2.25rem, 10vw, 4rem); text-align: center; letter-spacing: 0.02em; }
  h2 { font-size: clamp(1.5rem, 6vw, 2rem); text-align: center; opacity: 0.8; }

  .menu { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 22rem; }
  button {
    font: inherit;
    color: #5d4037;
    background: #ffd6a5;
    border: none;
    border-radius: 1.25rem;
    padding: 1.25rem 1.5rem;
    font-size: 1.5rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(93, 64, 55, 0.25);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    width: 100%;
    max-width: 22rem;
  }
  button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(93, 64, 55, 0.25); }
  .join { background: #caffbf; }
  .back { background: #f0e0d0; font-size: 1rem; padding: 0.75rem 1.25rem; max-width: 8rem; }

  .code-box {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: clamp(3rem, 18vw, 6rem);
    font-weight: 700;
    letter-spacing: 0.4rem;
    background: #fff5e1;
    color: #5d4037;
    padding: 1rem 1.5rem;
    border-radius: 1.25rem;
    border: 3px dashed #d4a574;
    text-align: center;
    text-transform: uppercase;
  }
  input.code-box {
    font-size: clamp(2.5rem, 14vw, 5rem);
    width: 100%;
    max-width: 16rem;
    outline: none;
  }

  .hint { font-size: 1rem; opacity: 0.8; text-align: center; max-width: 22rem; }
  .status { font-size: 1rem; opacity: 0.7; min-height: 1.5em; text-align: center; }
  .status.error { color: #c62828; opacity: 1; }

  /* GAME SCREEN */
  #screen-game {
    padding: 0;
    gap: 0;
    justify-content: stretch;
    align-items: stretch;
  }
  .game-top {
    padding: 0.75rem 1rem 0.5rem;
    text-align: center;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
  }
  .top-row {
    display: flex;
    gap: 1.5rem;
    align-items: baseline;
  }
  .tip-counter, .day-timer {
    font-size: 1.7rem;
    font-weight: 700;
    color: #5d4037;
    transition: color 0.2s ease;
  }
  .day-timer {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .tip-counter.bump {
    animation: tip-bump 0.5s ease-out;
  }
  .day-timer.urgent {
    color: #c62828;
    animation: timer-pulse 1s ease-in-out infinite;
  }
  .day-timer.done {
    color: #c62828;
  }
  @keyframes tip-bump {
    0%   { transform: scale(1); color: #5d4037; }
    35%  { transform: scale(1.35); color: #2e7d32; }
    100% { transform: scale(1); color: #5d4037; }
  }
  @keyframes timer-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.1); }
  }
  .game-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0.75rem 1rem;
    gap: 0.75rem;
    min-height: 0;
  }

  /* ORDER TICKET */
  .ticket {
    background: #fffaee;
    border: 2px dashed #d4a574;
    border-radius: 0.85rem;
    padding: 0.65rem 1rem 0.8rem;
    box-shadow: 0 3px 0 rgba(93, 64, 55, 0.15);
    transform: rotate(-2deg);
    text-align: center;
    min-width: 12rem;
    max-width: 90%;
    flex-shrink: 0;
  }
  .ticket-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.55;
    margin-bottom: 0.15rem;
  }
  .ticket-name {
    font-weight: 700;
    font-size: 1.15rem;
    color: #5d4037;
    margin-bottom: 0.5rem;
  }
  .ticket-notes {
    display: flex;
    gap: 0.35rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .note-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.9rem;
    height: 1.9rem;
    border-radius: 50%;
    background: #ffd6a5;
    color: #5d4037;
    font-weight: 700;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 1rem;
    box-shadow: 0 2px 0 rgba(93, 64, 55, 0.18);
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .note-chip.played {
    background: #a8e6a3;
    transform: scale(1.08);
  }
  /* CAT */
  .cat-mount { width: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
  .cat-svg { width: min(72vw, 320px); height: auto; display: block; overflow: visible; }
  .cat-mount-preview .cat-svg { width: min(45vw, 200px); }

  /* VIEW TOGGLE + STAGES */
  .view {
    display: none;
    width: 100%;
    flex: 1;
    min-height: 0;
  }
  .view.active {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }
  .view-toggle-btn {
    padding: 0.3rem 0.8rem;
    font-size: 0.8rem;
    font-weight: 600;
    background: #ffd6a5;
    border-radius: 0.7rem;
    border: none;
    box-shadow: 0 2px 0 rgba(93, 64, 55, 0.2);
    color: #5d4037;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 0.3rem;
  }
  .view-toggle-btn:active {
    transform: translateY(1px);
    box-shadow: 0 1px 0 rgba(93, 64, 55, 0.2);
  }
  .course-svg {
    max-width: 100%;
    max-height: 100%;
    border-radius: 0.5rem;
    box-shadow: 0 4px 0 rgba(93, 64, 55, 0.2);
    display: block;
    cursor: pointer;
  }
  .cat-golf-svg {
    transform-box: fill-box;
    transform-origin: 50% 95%;
    transition: transform 0.3s ease-out;
  }
  .cat-golf-svg.windup { transform: rotate(-22deg); transition: transform 0.35s ease-out; }
  .cat-golf-svg.swing  { transform: rotate(18deg);  transition: transform 0.15s ease-in; }
  .cat-golf-svg.celebrate { animation: cat-celebrate 0.7s ease-in-out; }
  .cat-golf-svg.pout      { animation: cat-pout 0.5s ease-in-out; }
  @keyframes cat-celebrate {
    0%, 100% { transform: translateY(0) rotate(0); }
    25%      { transform: translateY(-12px) rotate(-5deg); }
    50%      { transform: translateY(-18px) rotate(4deg); }
    75%      { transform: translateY(-10px) rotate(-2deg); }
  }
  @keyframes cat-pout {
    0%, 100% { transform: translateX(0) rotate(0); }
    30%      { transform: translateX(-5px) rotate(-3deg); }
    70%      { transform: translateX(5px) rotate(3deg); }
  }

  /* CUSTOMIZE */
  #screen-customize {
    justify-content: flex-start;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 1rem 1.25rem 2rem;
    gap: 0.9rem;
  }
  .customize-section { width: 100%; max-width: 22rem; text-align: center; }
  .section-label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 0.4rem;
  }
  .swatch-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
  .swatch {
    width: 2.5rem; height: 2.5rem;
    border-radius: 50%;
    border: 3px solid #fdf6e3;
    box-shadow: 0 0 0 2px rgba(93, 64, 55, 0.15);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .swatch.selected {
    box-shadow: 0 0 0 3px #5d4037;
    transform: scale(1.1);
  }
  .option-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
  .option-btn {
    padding: 0.5rem 1rem;
    border-radius: 1rem;
    background: #fff5e1;
    border: 2px solid transparent;
    font: inherit;
    font-weight: 600;
    color: #5d4037;
    text-transform: capitalize;
    cursor: pointer;
    box-shadow: 0 2px 0 rgba(93, 64, 55, 0.15);
  }
  .option-btn.selected {
    background: #ffd6a5;
    border-color: #5d4037;
  }
  .cat-tail {
    transform-box: fill-box;
    transform-origin: 0% 100%;
    animation: tail-sway 2.6s ease-in-out infinite;
  }
  .cat-eyes {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: blink 4.4s infinite;
  }
  @keyframes tail-sway {
    0%, 100% { transform: rotate(-5deg); }
    50%      { transform: rotate(6deg); }
  }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    94%, 98%      { transform: scaleY(0.08); }
  }
  /* eat reaction */
  .cat-mount.happy .cat-svg { animation: cat-bounce 0.45s ease-in-out 3; }
  .cat-mount.happy .cat-eyes {
    animation: none !important;
    transform: scaleY(0.18);
  }
  @keyframes cat-bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }
  /* wrong-note reaction */
  .cat-mount.sad .cat-svg { animation: cat-shake 0.4s ease-in-out; }
  @keyframes cat-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px) rotate(-2deg); }
    75% { transform: translateX(6px) rotate(2deg); }
  }

  /* PIANO */
  .piano {
    height: 23vh;
    min-height: 126px;
    display: flex;
    background: #5d4037;
    padding: 0.5rem 4px calc(0.5rem + env(safe-area-inset-bottom)) 4px;
    gap: 4px;
    flex-shrink: 0;
  }
  .key {
    flex: 1 1 0;
    min-width: 0;
    background: #fff8e7;
    border-radius: 0 0 0.9rem 0.9rem;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 0.9rem;
    font-weight: 700;
    color: #5d4037;
    font-size: 1.2rem;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    box-shadow: inset 0 -8px 0 rgba(93, 64, 55, 0.12);
    transition: transform 0.05s ease, background 0.05s ease, box-shadow 0.05s ease;
  }
  .key.pressed {
    background: #f5e0b8;
    transform: translateY(2px);
    box-shadow: inset 0 -4px 0 rgba(93, 64, 55, 0.18);
  }
</style>
</head>
<body>

<div id="screen-menu" class="screen active">
  <h1>Purrfect Course</h1>
  <div class="menu">
    <button id="btn-host" type="button">Host Game</button>
    <button id="btn-join" class="join" type="button">Join Game</button>
  </div>
</div>

<div id="screen-host" class="screen">
  <h2>Room Code</h2>
  <div id="host-code" class="code-box">----</div>
  <p class="hint">Tell friend this code</p>
  <p id="host-status" class="status">Starting...</p>
  <button id="btn-host-back" class="back" type="button">Back</button>
</div>

<div id="screen-join" class="screen">
  <h2>Enter Code</h2>
  <input id="join-input" class="code-box" maxlength="4" inputmode="text"
         autocapitalize="characters" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="MEOW">
  <button id="btn-connect" type="button">Connect</button>
  <p id="join-status" class="status"></p>
  <button id="btn-join-back" class="back" type="button">Back</button>
</div>

<div id="screen-connected" class="screen">
  <h1>Connected!</h1>
  <p class="hint">Both phones ready</p>
</div>

<div id="screen-game" class="screen">
  <div class="game-top">
    <button id="view-toggle" class="view-toggle-btn" type="button">Course</button>
    <div class="top-row">
      <div id="tip-counter" class="tip-counter">$0</div>
      <div id="day-timer" class="day-timer">1:00</div>
    </div>
    <p class="hint" id="game-hint">Play the order</p>
  </div>
  <div class="game-stage">
    <div id="view-chef" class="view view-chef active">
      <div id="ticket" class="ticket">
        <div class="ticket-label">Order</div>
        <div id="ticket-name" class="ticket-name"></div>
        <div id="ticket-notes" class="ticket-notes"></div>
      </div>
      <div id="cat-mount" class="cat-mount"></div>
    </div>
    <div id="view-course" class="view view-course"></div>
  </div>
  <div id="piano" class="piano"></div>
</div>

<div id="screen-customize" class="screen">
  <h2>Customize Cat</h2>
  <div id="customize-preview" class="cat-mount-preview"></div>
  <div class="customize-section">
    <div class="section-label">Fur</div>
    <div id="fur-swatches" class="swatch-row"></div>
  </div>
  <div class="customize-section">
    <div class="section-label">Eyes</div>
    <div id="eye-swatches" class="swatch-row"></div>
  </div>
  <div class="customize-section">
    <div class="section-label">Pattern</div>
    <div id="pattern-options" class="option-row"></div>
  </div>
  <div class="customize-section">
    <div class="section-label">Hat</div>
    <div id="hat-options" class="option-row"></div>
  </div>
  <div class="customize-section">
    <div class="section-label">Bowtie / Scarf</div>
    <div id="accessory-options" class="option-row"></div>
  </div>
  <button id="btn-customize-done" type="button">Done</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
<script>
  /* ============================================================
     DATA SCHEMAS — for game data and future AI generation
     ============================================================
     CAT: {
       id: string,
       name: string,
       fur_color: hex,            // e.g. "#e8a96b"
       pattern: "solid"|"tabby"|"tuxedo"|"calico"|"spotted",
       eye_color: hex,
       hat: "none"|"chef"|"visor"|"beret"|"crown",
       accessory: "none"|"bowtie"|"scarf"|"glasses",
       favorite_food: string,     // recipe id
       golf_style: "power"|"finesse"|"lucky"|"chaotic",
       personality: string
     }
     RECIPE: {
       id: string,
       name: string,
       notes: string[],           // ["C","E","G"]
       rhythm: number[],          // beat durations [0.5, 0.5, 1]
       difficulty: number,
       tip_value: number,
       cat_dialogue: string
     }
     HOLE: {
       id: string,
       name: string,
       layout: number[][],        // 2D grid of tile codes
       par: number,
       hazards: object[],
       tee_position: [number, number],
       hole_position: [number, number]
     }
     ============================================================ */

  const APP_PREFIX = 'purrfect-course-v1-';
  const $ = id => document.getElementById(id);
  let peer = null;
  let conn = null;
  let synth = null;

  /* ---------- SCREENS ---------- */
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
  }

  /* ---------- AUDIO ---------- */
  async function ensureAudio() {
    if (synth) return;
    try {
      await Tone.start();
      synth = new Tone.PolySynth(Tone.Synth).toDestination();
      synth.volume.value = -8;
    } catch (e) {}
  }
  async function playNote(note) {
    await ensureAudio();
    if (synth) synth.triggerAttackRelease(note, '8n');
  }

  /* ---------- NETWORK ROLE + SYNC ---------- */
  let role = null;            // 'host' | 'client' | null
  let stateInterval = null;
  let remotePressedLabels = new Set();

  function broadcastState() {
    if (role !== 'host' || !conn || !conn.open) return;
    conn.send({
      type: 'state',
      tips,
      pressedLabels: [...pressedLabels()],
      recipeId: currentRecipe ? currentRecipe.id : null,
      secondsLeft,
    });
  }
  function broadcastInput() {
    if (role !== 'client' || !conn || !conn.open) return;
    conn.send({
      type: 'input',
      pressedLabels: [...pressedIndices].map(i => NOTES[i].label),
    });
  }
  function broadcastReaction(kind) {
    if (role !== 'host' || !conn || !conn.open) return;
    conn.send({ type: 'react', kind });
  }
  function startNetworkTick() {
    stopNetworkTick();
    stateInterval = setInterval(() => {
      if (role === 'host') broadcastState();
      else if (role === 'client') broadcastInput();
    }, 100);
  }
  function stopNetworkTick() {
    if (stateInterval) clearInterval(stateInterval);
    stateInterval = null;
  }
  function setEqual(a, b) {
    if (a.size !== b.size) return false;
    for (const x of a) if (!b.has(x)) return false;
    return true;
  }
  function applyRemoteState(s) {
    if (role !== 'client') return;
    const incomingId = s.recipeId || null;
    const localId = currentRecipe ? currentRecipe.id : null;
    if (incomingId !== localId) {
      if (incomingId) {
        const r = findRecipe(incomingId);
        if (r) { currentRecipe = r; renderTicket(r); }
      } else {
        currentRecipe = null;
        renderTicket(null);
      }
    }
    if (s.tips !== tips) {
      const bump = s.tips > tips;
      tips = s.tips;
      updateTipDisplay(bump);
    }
    if (typeof s.secondsLeft === 'number' && s.secondsLeft !== secondsLeft) {
      const wasActive = secondsLeft > 0 && dayActive;
      secondsLeft = s.secondsLeft;
      dayActive = secondsLeft > 0;
      updateTimerDisplay();
      if (wasActive && secondsLeft <= 0) {
        $('game-hint').textContent = 'Day Over! Total: $' + tips;
      }
    }
    if (currentRecipe) {
      const labels = new Set(s.pressedLabels || []);
      currentRecipe.notes.forEach((n, idx) => {
        chipEls[idx]?.classList.toggle('played', labels.has(n));
      });
    }
  }
  function applyRemoteInput(s) {
    if (role !== 'host') return;
    const newLabels = new Set(s.pressedLabels || []);
    if (setEqual(newLabels, remotePressedLabels)) return;
    remotePressedLabels = newLabels;
    updatePlayedChips();
    checkChord();
  }
  function applyRemoteReaction(kind) {
    if (role !== 'client') return;
    catReact(kind, kind === 'happy' ? 1500 : 400);
  }

  /* ---------- CAT ---------- */
  const CATS = [{
    id: 'mochi',
    name: 'Mochi',
    fur_color: '#e8a96b',
    pattern: 'solid',
    eye_color: '#1a1a1a',
    hat: 'none',
    accessory: 'none',
    favorite_food: 'tuna_souffle',
    golf_style: 'finesse',
    personality: 'shy and patient'
  }];

  function darken(hex, amt) {
    amt = amt == null ? 0.3 : amt;
    const h = hex.replace('#', '');
    const r = parseInt(h.substr(0, 2), 16);
    const g = parseInt(h.substr(2, 2), 16);
    const b = parseInt(h.substr(4, 2), 16);
    const f = v => Math.max(0, Math.floor(v * (1 - amt))).toString(16).padStart(2, '0');
    return '#' + f(r) + f(g) + f(b);
  }

  const CAT_PARTS = {
    patterns: {
      solid: () => '',
      tabby: (cat) => {
        const c = darken(cat.fur_color, 0.35);
        return `
          <g opacity="0.55" fill="none" stroke="${c}" stroke-linecap="round">
            <path d="M58,168 Q72,164 90,167" stroke-width="4"/>
            <path d="M56,184 Q72,180 92,183" stroke-width="4"/>
            <path d="M58,200 Q72,196 88,198" stroke-width="4"/>
            <path d="M110,167 Q126,164 142,168" stroke-width="4"/>
            <path d="M108,183 Q126,180 144,184" stroke-width="4"/>
            <path d="M112,198 Q126,196 142,200" stroke-width="4"/>
            <path d="M92,82 Q100,78 108,82" stroke-width="3"/>
            <path d="M95,70 Q100,66 105,70" stroke-width="3"/>
            <path d="M100,58 L100,66" stroke-width="3"/>
          </g>`;
      },
      tuxedo: () => `
        <path d="M82,138 Q100,132 118,138 L122,212 Q100,224 78,212 Z"
              fill="#fff" opacity="0.95"/>
        <path d="M93,138 L93,128 Q100,125 107,128 L107,138 Z"
              fill="#fff" opacity="0.95"/>`,
      siamese: (cat) => {
        const dark = darken(cat.fur_color, 0.6);
        return {
          body: '',
          head: `
            <path d="M62,80 L70,38 L96,72 Z" fill="${dark}"/>
            <path d="M138,80 L130,38 L104,72 Z" fill="${dark}"/>
            <path d="M73,74 L77,52 L88,68 Z" fill="#f4a8a8"/>
            <path d="M127,74 L123,52 L112,68 Z" fill="#f4a8a8"/>
            <ellipse cx="100" cy="122" rx="36" ry="22" fill="${dark}" opacity="0.45"/>
          `
        };
      },
    },
    hats: {
      none: () => '',
      chef: () => `
        <g>
          <ellipse cx="100" cy="50" rx="34" ry="6" fill="#eeeeee"/>
          <rect x="66" y="42" width="68" height="12" rx="3" fill="#fff"/>
          <ellipse cx="82" cy="35" rx="15" ry="15" fill="#fff"/>
          <ellipse cx="100" cy="26" rx="17" ry="15" fill="#fff"/>
          <ellipse cx="118" cy="35" rx="15" ry="15" fill="#fff"/>
        </g>`,
      visor: () => `
        <g>
          <path d="M58,52 Q100,44 142,52 L142,62 Q100,57 58,62 Z" fill="#2e7d32"/>
          <ellipse cx="100" cy="54" rx="42" ry="3" fill="#1b5e20"/>
        </g>`,
    },
    accessories: {
      none: () => '',
      bowtie: () => `
        <g>
          <path d="M80,146 L98,140 L98,156 L80,150 Z" fill="#c62828"/>
          <path d="M120,146 L102,140 L102,156 L120,150 Z" fill="#c62828"/>
          <rect x="97" y="143" width="6" height="10" rx="1" fill="#8e1818"/>
        </g>`,
      scarf: () => `
        <g>
          <path d="M62,142 Q100,150 138,142 L138,156 Q100,164 62,156 Z" fill="#5e35b1"/>
          <path d="M68,143 Q75,147 75,156" stroke="#9575cd" stroke-width="2" fill="none"/>
          <path d="M85,143 Q92,147 92,156" stroke="#9575cd" stroke-width="2" fill="none"/>
          <path d="M108,143 Q115,147 115,156" stroke="#9575cd" stroke-width="2" fill="none"/>
          <path d="M125,143 Q132,147 132,156" stroke="#9575cd" stroke-width="2" fill="none"/>
        </g>`,
    },
  };

  function buildCatInner(cat) {
    const fur = cat.fur_color;
    const eye = cat.eye_color;
    const p = (CAT_PARTS.patterns[cat.pattern] || CAT_PARTS.patterns.solid)(cat) || '';
    const bodyPattern = typeof p === 'string' ? p : (p.body || '');
    const headPattern = typeof p === 'string' ? '' : (p.head || '');
    const hat = (CAT_PARTS.hats[cat.hat] || CAT_PARTS.hats.none)(cat);
    const accessory = (CAT_PARTS.accessories[cat.accessory] || CAT_PARTS.accessories.none)(cat);
    return `
  <g class="cat-tail">
    <path d="M148,180 Q200,150 188,90 Q183,72 196,68"
          fill="none" stroke="${fur}" stroke-width="16" stroke-linecap="round"/>
  </g>
  <g class="cat-body">
    <ellipse cx="100" cy="182" rx="56" ry="48" fill="${fur}"/>
    <g class="cat-pattern">${bodyPattern}</g>
  </g>
  <g class="cat-head">
    <path d="M62,80 L70,38 L96,72 Z" fill="${fur}"/>
    <path d="M138,80 L130,38 L104,72 Z" fill="${fur}"/>
    <path d="M73,74 L77,52 L88,68 Z" fill="#f4a8a8"/>
    <path d="M127,74 L123,52 L112,68 Z" fill="#f4a8a8"/>
    <ellipse cx="100" cy="108" rx="50" ry="44" fill="${fur}"/>
    <g class="cat-pattern-head">${headPattern}</g>
    <g stroke="#5d4037" stroke-width="1.2" stroke-linecap="round" opacity="0.7">
      <line x1="48" y1="118" x2="78" y2="118"/>
      <line x1="50" y1="128" x2="78" y2="123"/>
      <line x1="152" y1="118" x2="122" y2="118"/>
      <line x1="150" y1="128" x2="122" y2="123"/>
    </g>
    <g class="cat-eyes">
      <ellipse cx="83" cy="108" rx="6.5" ry="10.5" fill="${eye}"/>
      <ellipse cx="117" cy="108" rx="6.5" ry="10.5" fill="${eye}"/>
      <circle cx="85" cy="104" r="2.2" fill="#fff"/>
      <circle cx="119" cy="104" r="2.2" fill="#fff"/>
    </g>
    <path d="M96,122 L104,122 L100,128 Z" fill="#f4a8a8"/>
    <path d="M100,128 Q94,134 89,131 M100,128 Q106,134 111,131"
          stroke="#5d4037" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  </g>
  <g class="cat-hat">${hat}</g>
  <g class="cat-accessory">${accessory}</g>
`;
  }
  function buildCat(cat) {
    return `<svg viewBox="0 0 200 240" class="cat-svg" xmlns="http://www.w3.org/2000/svg">${buildCatInner(cat)}</svg>`;
  }

  function renderCat(cat) {
    $('cat-mount').innerHTML = buildCat(cat);
  }

  /* ---------- CUSTOMIZE ---------- */
  const FUR_COLORS = ['#e8a96b', '#a0a0a8', '#f5e0c2', '#3e2723', '#d4b896', '#d97a3c', '#0d0d0d'];
  const EYE_COLORS = ['#1a1a1a', '#4caf50', '#1976d2', '#ffa726'];
  const STORAGE_KEY = 'purrfect-cat-v1';

  function saveCustomCat() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(CATS[0])); } catch (e) {}
  }
  function loadCustomCat() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) Object.assign(CATS[0], JSON.parse(raw));
    } catch (e) {}
  }
  function broadcastCat() {
    if (!conn || !conn.open) return;
    conn.send({ type: 'cat', cat: CATS[0] });
  }
  function applyRemoteCat(cat) {
    if (!cat) return;
    Object.assign(CATS[0], cat);
    saveCustomCat();
    renderCat(CATS[0]);
    if ($('screen-customize').classList.contains('active')) refreshCustomize();
  }

  function buildSwatches(parentId, colors, currentValue, onPick) {
    const parent = $(parentId);
    parent.innerHTML = '';
    colors.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'swatch' + (c === currentValue ? ' selected' : '');
      sw.style.background = c;
      sw.addEventListener('click', () => onPick(c));
      parent.appendChild(sw);
    });
  }
  function buildOptions(parentId, options, currentValue, onPick) {
    const parent = $(parentId);
    parent.innerHTML = '';
    options.forEach(opt => {
      const b = document.createElement('button');
      b.className = 'option-btn' + (opt === currentValue ? ' selected' : '');
      b.type = 'button';
      b.textContent = opt;
      b.addEventListener('click', () => onPick(opt));
      parent.appendChild(b);
    });
  }
  function refreshCustomize() {
    const cat = CATS[0];
    $('customize-preview').innerHTML = buildCat(cat);
    buildSwatches('fur-swatches', FUR_COLORS, cat.fur_color, c => updateCat({ fur_color: c }));
    buildSwatches('eye-swatches', EYE_COLORS, cat.eye_color, c => updateCat({ eye_color: c }));
    buildOptions('pattern-options', Object.keys(CAT_PARTS.patterns), cat.pattern, p => updateCat({ pattern: p }));
    buildOptions('hat-options', Object.keys(CAT_PARTS.hats), cat.hat, h => updateCat({ hat: h }));
    buildOptions('accessory-options', Object.keys(CAT_PARTS.accessories), cat.accessory, a => updateCat({ accessory: a }));
  }
  function updateCat(changes) {
    Object.assign(CATS[0], changes);
    saveCustomCat();
    renderCat(CATS[0]);
    refreshCustomize();
    broadcastCat();
  }
  function openCustomize() {
    show('screen-customize');
    refreshCustomize();
  }
  function closeCustomize() {
    show('screen-game');
  }

  /* ---------- RECIPES ---------- */
  const RECIPES = [
    {
      id: 'tuna_souffle',
      name: 'Tuna Soufflé',
      notes: ['C', 'E', 'G'],
      rhythm: [0.5, 0.5, 1],
      difficulty: 1,
      tip_value: 10,
      cat_dialogue: 'Mmm, fishy please!'
    },
  ];
  function findRecipe(id) { return RECIPES.find(r => r.id === id); }

  /* ---------- COURSE / HOLES ---------- */
  /* tile codes: 0 grass, 1 sand, 2 water, 3 wall, 4 tee, 5 hole */
  const HOLES = [
    {
      id: 'hole-1',
      name: 'Whiskers Way',
      par: 3,
      layout: [
        [3,3,3,3,3,3,3,3],
        [3,0,0,0,0,0,0,3],
        [3,0,4,0,0,0,0,3],
        [3,0,0,0,0,0,0,3],
        [3,0,0,0,1,1,0,3],
        [3,0,0,0,1,1,0,3],
        [3,0,0,0,0,0,0,3],
        [3,0,2,2,0,0,0,3],
        [3,0,2,2,0,0,0,3],
        [3,0,0,0,0,0,0,3],
        [3,0,0,0,0,5,0,3],
        [3,3,3,3,3,3,3,3],
      ],
      hazards: [],
      tee_position: [2, 2],
      hole_position: [5, 10],
    },
  ];

  let currentHole = HOLES[0];
  let ball = { x: 0, y: 0 };

  function setBallToTee(hole) {
    const [tx, ty] = hole.tee_position;
    ball.x = tx + 0.5;
    ball.y = ty + 0.5;
  }
  function buildCourse(hole) {
    const CELL = 40;
    const cols = hole.layout[0].length;
    const rows = hole.layout.length;
    const w = cols * CELL, h = rows * CELL;
    const TILE = {
      0: '#8bc34a', // grass
      1: '#ffd180', // sand
      2: '#4fc3f7', // water
      3: '#6d4c41', // wall
      4: '#9ccc65', // tee (lighter grass)
      5: '#8bc34a', // hole tile (cup drawn on top)
    };
    let tiles = '';
    hole.layout.forEach((row, y) => {
      row.forEach((cell, x) => {
        tiles += `<rect x="${x*CELL}" y="${y*CELL}" width="${CELL}" height="${CELL}" fill="${TILE[cell] || TILE[0]}"/>`;
      });
    });
    const [teeX, teeY] = hole.tee_position;
    const teeMark = `<circle cx="${teeX*CELL + CELL/2}" cy="${teeY*CELL + CELL/2}" r="${CELL*0.32}" fill="#fff" opacity="0.45"/>`;
    const [holeX, holeY] = hole.hole_position;
    const cup = `
      <circle cx="${holeX*CELL + CELL/2}" cy="${holeY*CELL + CELL/2}" r="${CELL*0.34}" fill="#1a1a1a"/>
      <rect x="${holeX*CELL + CELL/2 - 1}" y="${holeY*CELL + CELL/2 - CELL*0.34}" width="2" height="${CELL*0.7}" fill="#5d4037"/>
      <path d="M${holeX*CELL + CELL/2 + 1},${holeY*CELL + CELL/2 - CELL*0.32}
               L${holeX*CELL + CELL/2 + 12},${holeY*CELL + CELL/2 - CELL*0.22}
               L${holeX*CELL + CELL/2 + 1},${holeY*CELL + CELL/2 - CELL*0.12} Z"
            fill="#e53935"/>`;
    const ballCx = ball.x * CELL, ballCy = ball.y * CELL;
    const catW = CELL * 2, catH = CELL * 1.9;
    const catX = ballCx - catW / 2;
    const catY = ballCy - catH * 0.6;
    const catGolf = `<svg x="${catX}" y="${catY}" width="${catW}" height="${catH}" viewBox="0 0 200 240" class="cat-golf-svg" id="cat-golf">${buildCatInner(CATS[0])}</svg>`;
    const ballSvg = `<circle id="ball" cx="${ballCx}" cy="${ballCy}" r="${CELL*0.22}" fill="#fff" stroke="#5d4037" stroke-width="1.5"/>`;
    return `<svg viewBox="0 0 ${w} ${h}" class="course-svg" xmlns="http://www.w3.org/2000/svg">${tiles}${teeMark}${cup}${catGolf}${ballSvg}</svg>`;
  }
  function renderCourse() {
    $('view-course').innerHTML = buildCourse(currentHole);
  }

  let swinging = false;
  function swingCat() {
    if (swinging) return;
    const c = document.getElementById('cat-golf');
    if (!c) return;
    swinging = true;
    c.classList.add('windup');
    setTimeout(() => {
      c.classList.remove('windup');
      c.classList.add('swing');
      setTimeout(() => {
        c.classList.remove('swing');
        const happy = Math.random() > 0.4;
        const reaction = happy ? 'celebrate' : 'pout';
        c.classList.add(reaction);
        setTimeout(() => {
          c.classList.remove(reaction);
          swinging = false;
        }, happy ? 700 : 500);
      }, 150);
    }, 350);
  }

  let activeView = 'chef';
  function setView(name) {
    activeView = name;
    $('view-chef').classList.toggle('active', name === 'chef');
    $('view-course').classList.toggle('active', name === 'course');
    $('view-toggle').textContent = name === 'chef' ? 'Course' : 'Cafe';
    if (name === 'course') renderCourse();
  }

  let chipEls = [];
  function renderTicket(recipe) {
    const t = $('ticket');
    if (!recipe) { t.style.display = 'none'; return; }
    t.style.display = '';
    $('ticket-name').textContent = recipe.name;
    const notes = $('ticket-notes');
    notes.innerHTML = '';
    chipEls = [];
    recipe.notes.forEach(n => {
      const c = document.createElement('span');
      c.className = 'note-chip';
      c.textContent = n;
      chipEls.push(c);
      notes.appendChild(c);
    });
  }

  /* ---------- COOKING ---------- */
  let currentRecipe = null;
  let tips = 0;

  function startOrder(recipe) {
    pressedIndices.forEach(i => {
      keyEls[i].dataset.down = '0';
      keyEls[i].classList.remove('pressed');
    });
    pressedIndices.clear();
    currentRecipe = recipe;
    renderTicket(recipe);
  }
  function updateTipDisplay(bump) {
    const el = $('tip-counter');
    el.textContent = '$' + tips;
    if (bump) {
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
    }
  }
  function catReact(klass, ms) {
    const m = $('cat-mount');
    m.classList.remove('happy', 'sad');
    void m.offsetWidth;
    m.classList.add(klass);
    setTimeout(() => m.classList.remove(klass), ms);
    broadcastReaction(klass);
  }
  function pressedLabels() {
    const set = new Set([...pressedIndices].map(i => NOTES[i].label));
    remotePressedLabels.forEach(l => set.add(l));
    return set;
  }
  function updatePlayedChips() {
    if (!currentRecipe) return;
    const labels = pressedLabels();
    currentRecipe.notes.forEach((n, idx) => {
      chipEls[idx]?.classList.toggle('played', labels.has(n));
    });
  }
  let chordWasMatched = false;
  function checkChord() {
    if (!currentRecipe || !dayActive) return;
    const labels = pressedLabels();
    const matched = currentRecipe.notes.every(n => labels.has(n));
    if (matched && !chordWasMatched) {
      chordWasMatched = true;
      onOrderComplete();
    } else if (!matched) {
      chordWasMatched = false;
    }
  }

  /* ---------- DAY TIMER ---------- */
  const DAY_LENGTH = 60;
  let secondsLeft = DAY_LENGTH;
  let dayActive = false;
  let dayInterval = null;

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }
  function updateTimerDisplay() {
    const el = $('day-timer');
    el.textContent = formatTime(Math.max(0, secondsLeft));
    el.classList.toggle('urgent', dayActive && secondsLeft <= 10 && secondsLeft > 0);
    el.classList.toggle('done', !dayActive && secondsLeft <= 0);
  }
  function startDay() {
    secondsLeft = DAY_LENGTH;
    dayActive = true;
    tips = 0;
    chordWasMatched = false;
    updateTipDisplay(false);
    $('day-timer').classList.remove('done', 'urgent');
    $('game-hint').textContent = 'Play the order';
    updateTimerDisplay();
    if (dayInterval) clearInterval(dayInterval);
    if (role !== 'client') {
      dayInterval = setInterval(tickDay, 1000);
      startOrder(RECIPES[0]);
    }
  }
  function tickDay() {
    if (!dayActive) return;
    secondsLeft -= 1;
    if (secondsLeft <= 0) {
      secondsLeft = 0;
      endDay();
    }
    updateTimerDisplay();
  }
  function endDay() {
    dayActive = false;
    currentRecipe = null;
    renderTicket(null);
    chordWasMatched = false;
    pressedIndices.forEach(i => {
      keyEls[i].dataset.down = '0';
      keyEls[i].classList.remove('pressed');
    });
    pressedIndices.clear();
    remotePressedLabels.clear();
    $('game-hint').textContent = 'Day Over! Total: $' + tips;
    $('day-timer').classList.remove('urgent');
    $('day-timer').classList.add('done');
    if (dayInterval) { clearInterval(dayInterval); dayInterval = null; }
  }
  function onOrderComplete() {
    tips += currentRecipe.tip_value;
    updateTipDisplay(true);
    catReact('happy', 1500);
    $('game-hint').textContent = 'Yum! +$' + currentRecipe.tip_value;
    const finished = currentRecipe;
    currentRecipe = null;
    setTimeout(() => {
      $('game-hint').textContent = 'Play the order';
      startOrder(finished);
    }, 1700);
  }

  /* ---------- PIANO ---------- */
  const NOTES = [
    { note: 'C4', label: 'C' },
    { note: 'D4', label: 'D' },
    { note: 'E4', label: 'E' },
    { note: 'F4', label: 'F' },
    { note: 'G4', label: 'G' },
    { note: 'A4', label: 'A' },
    { note: 'B4', label: 'B' },
    { note: 'C5', label: 'C' },
  ];
  const keyEls = [];
  const pressedIndices = new Set();
  function pressKey(i) {
    const k = keyEls[i];
    if (!k || k.dataset.down === '1') return;
    k.dataset.down = '1';
    k.classList.add('pressed');
    playNote(NOTES[i].note);
    pressedIndices.add(i);
    if (role !== 'client') {
      updatePlayedChips();
      checkChord();
    }
  }
  function releaseKey(i) {
    const k = keyEls[i];
    if (!k || k.dataset.down !== '1') return;
    k.dataset.down = '0';
    k.classList.remove('pressed');
    pressedIndices.delete(i);
    if (role !== 'client') {
      updatePlayedChips();
      checkChord();
    }
  }
  function buildPiano() {
    const piano = $('piano');
    NOTES.forEach(({ label }, i) => {
      const k = document.createElement('div');
      k.className = 'key';
      k.textContent = label;
      const press = () => pressKey(i);
      const release = () => releaseKey(i);
      k.addEventListener('pointerdown', press);
      k.addEventListener('pointerup', release);
      k.addEventListener('pointercancel', release);
      k.addEventListener('pointerleave', release);
      keyEls.push(k);
      piano.appendChild(k);
    });
  }

  /* ---------- HANDSHAKE ---------- */
  function randCode() {
    let s = '';
    for (let i = 0; i < 4; i++) s += String.fromCharCode(65 + Math.floor(Math.random() * 26));
    return s;
  }
  function cleanupPeer() {
    stopNetworkTick();
    remotePressedLabels.clear();
    if (dayInterval) { clearInterval(dayInterval); dayInterval = null; }
    if (conn) { try { conn.close(); } catch (e) {} conn = null; }
    if (peer) { try { peer.destroy(); } catch (e) {} peer = null; }
  }
  function onConnected(c) {
    conn = c;
    show('screen-connected');
    c.on('close', () => {
      $('game-hint').textContent = 'Friend disconnected';
      stopNetworkTick();
      remotePressedLabels.clear();
      if (role !== 'client') updatePlayedChips();
    });
    c.on('data', d => {
      if (!d || typeof d !== 'object') return;
      if (d.type === 'state') applyRemoteState(d);
      else if (d.type === 'input') applyRemoteInput(d);
      else if (d.type === 'react') applyRemoteReaction(d.kind);
      else if (d.type === 'cat') applyRemoteCat(d.cat);
    });
    setTimeout(() => {
      show('screen-game');
      startDay();
    }, 1200);
    startNetworkTick();
  }
  function startHost() {
    show('screen-host');
    $('host-code').textContent = '----';
    setStatus('host-status', 'Starting...', false);
    role = 'host';
    tryHost(0);
  }
  function tryHost(attempt) {
    if (attempt > 4) { setStatus('host-status', 'Network busy. Try again.', true); return; }
    const code = randCode();
    cleanupPeer();
    peer = new Peer(APP_PREFIX + code);
    peer.on('open', () => {
      $('host-code').textContent = code;
      setStatus('host-status', 'Waiting for friend...', false);
    });
    peer.on('connection', c => { c.on('open', () => onConnected(c)); });
    peer.on('error', err => {
      if (err.type === 'unavailable-id') tryHost(attempt + 1);
      else setStatus('host-status', 'Error: ' + err.type, true);
    });
  }
  function startJoin() {
    show('screen-join');
    $('join-input').value = '';
    setStatus('join-status', '', false);
    $('join-input').focus();
  }
  function tryConnect() {
    const code = $('join-input').value.trim().toUpperCase();
    if (code.length !== 4) { setStatus('join-status', 'Need 4 letters', true); return; }
    setStatus('join-status', 'Connecting...', false);
    cleanupPeer();
    role = 'client';
    peer = new Peer();
    peer.on('open', () => {
      const c = peer.connect(APP_PREFIX + code);
      c.on('open', () => onConnected(c));
    });
    peer.on('error', err => {
      const msg = err.type === 'peer-unavailable' ? 'No room with that code' : 'Could not connect';
      setStatus('join-status', msg, true);
    });
  }
  function setStatus(id, text, isError) {
    const el = $(id);
    el.textContent = text;
    el.classList.toggle('error', !!isError);
  }
  function backToMenu() { cleanupPeer(); role = null; show('screen-menu'); }

  /* ---------- WIRE UP ---------- */
  $('btn-host').addEventListener('click', () => { ensureAudio(); startHost(); });
  $('btn-join').addEventListener('click', () => { ensureAudio(); startJoin(); });
  $('btn-connect').addEventListener('click', tryConnect);
  $('btn-host-back').addEventListener('click', backToMenu);
  $('btn-join-back').addEventListener('click', backToMenu);
  $('cat-mount').addEventListener('click', openCustomize);
  $('btn-customize-done').addEventListener('click', closeCustomize);
  $('view-toggle').addEventListener('click', () => setView(activeView === 'chef' ? 'course' : 'chef'));
  $('view-course').addEventListener('click', swingCat);
  $('join-input').addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
  });
  $('join-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryConnect(); });

  buildPiano();
  loadCustomCat();
  renderCat(CATS[0]);
  startOrder(RECIPES[0]);
  updateTipDisplay(false);
  setBallToTee(currentHole);
  renderCourse();

  /* keyboard 1-8 → piano keys (only on game screen) */
  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (!$('screen-game').classList.contains('active')) return;
    const i = '12345678'.indexOf(e.key);
    if (i >= 0) { e.preventDefault(); pressKey(i); }
  });
  document.addEventListener('keyup', e => {
    if (!$('screen-game').classList.contains('active')) return;
    const i = '12345678'.indexOf(e.key);
    if (i >= 0) releaseKey(i);
  });
</script>

</body>
</html>
