<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fdf6e3">
<title>Purrfect Course</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
  body {
    background: #fdf6e3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #5d4037;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 1.25rem env(safe-area-inset-bottom) 1.25rem;
    gap: 2.5rem;
  }
  h1 {
    font-size: clamp(2.25rem, 10vw, 4rem);
    text-align: center;
    letter-spacing: 0.02em;
  }
  .menu {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 22rem;
  }
  button {
    font: inherit;
    color: #5d4037;
    border: none;
    border-radius: 1.25rem;
    padding: 1.25rem 1.5rem;
    font-size: 1.5rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(93, 64, 55, 0.25);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  button:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(93, 64, 55, 0.25);
  }
  .host { background: #ffd6a5; }
  .join { background: #caffbf; }
</style>
</head>
<body>
  <h1>Purrfect Course</h1>
  <div class="menu">
    <button class="host" type="button">Host Game</button>
    <button class="join" type="button">Join Game</button>
  </div>
</body>
</html>
